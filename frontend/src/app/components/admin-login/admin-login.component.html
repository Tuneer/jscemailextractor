<div class="admin-login-container">
  <div class="admin-login-card">
    <div class="admin-login-header">
      <div class="logo">
        <h2>🛡️ Admin Portal</h2>
      </div>
      <h1>Administrator Login</h1>
      <p class="subtitle">Access business management dashboard</p>
    </div>
    
    <div class="admin-login-body">
      <div class="form-step">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            class="input-field"
            [(ngModel)]="username"
            placeholder="Enter your username"
            [disabled]="loading"
            (keyup.enter)="login()"
          >
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="input-field"
            [(ngModel)]="password"
            placeholder="Enter your password"
            [disabled]="loading"
            (keyup.enter)="login()"
          >
        </div>
        
        <button
          class="btn btn-primary"
          [disabled]="loading"
          (click)="login()"
        >
          <span class="loading-spinner" *ngIf="loading"></span>
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>
      </div>
      
      <div class="message" [class]="'message-' + messageType" *ngIf="message">
        <span class="message-icon">
          <span *ngIf="messageType === 'success'">✅</span>
          <span *ngIf="messageType === 'error'">❌</span>
          <span *ngIf="messageType === 'info'">ℹ️</span>
        </span>
        {{ message }}
      </div>
    </div>
    
    <div class="admin-login-footer">
      <p>Return to <a routerLink="/login" class="link-button">User Login</a></p>
      <p class="company-name">JSC Global Solutions PVT. LTD.</p>
    </div>
  </div>
</div>
