<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <h2>📧 {{ getLoginTitle() }}</h2>
      </div>
      <h1>{{ getLoginTitle() }}</h1>
      <p class="subtitle">{{ getLoginSubtitle() }}</p>
    </div>
    
    <div class="login-body">
      <div class="form-step" *ngIf="step === 'email'">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            class="input-field"
            [(ngModel)]="email"
            placeholder="Enter your email address"
            [disabled]="loading"
            (keyup.enter)="requestOTP()"
          >
        </div>
        
        <button
          class="btn btn-primary"
          [disabled]="loading || !email"
          (click)="requestOTP()"
        >
          <span class="loading-spinner" *ngIf="loading"></span>
          {{ loading ? 'Processing...' : (isAdminLogin ? 'Continue' : 'Send OTP') }}
        </button>
      </div>
      
      <div class="form-step" *ngIf="step === 'otp'">
        <div class="otp-info" *ngIf="!isAdminLogin">
          <p>Enter the 6-digit OTP sent to your email</p>
        </div>
        
        <div class="form-group">
          <label for="otp">{{ isAdminLogin ? 'Admin Password' : 'OTP Code' }}</label>
          <input
            type="text"
            id="otp"
            class="input-field otp-input"
            [(ngModel)]="otp"
            placeholder="{{ isAdminLogin ? 'Enter admin password' : 'Enter 6-digit OTP' }}"
            [disabled]="loading"
            maxlength="{{ isAdminLogin ? '20' : '6' }}"
            (keyup.enter)="verifyOTP()"
          >
        </div>
        
        <button
          class="btn btn-primary"
          [disabled]="loading || !otp"
          (click)="verifyOTP()"
        >
          <span class="loading-spinner" *ngIf="loading"></span>
          {{ loading ? 'Verifying...' : 'Login' }}
        </button>
        
        <button
          class="btn btn-secondary"
          [disabled]="loading"
          (click)="backToEmail()"
        >
          Back
        </button>
      </div>
      
      <div class="message" [class]="'message-' + messageType" *ngIf="message">
        <span class="message-icon">
          <span *ngIf="messageType === 'success'">✅</span>
          <span *ngIf="messageType === 'error'">❌</span>
          <span *ngIf="messageType === 'info'">ℹ️</span>
        </span>
        {{ message }}
      </div>
    </div>
    
    <div class="login-footer">
      <p *ngIf="!isAdminLogin">
        Admin access? <button class="link-button" (click)="switchToAdmin()">Switch to Admin Login</button>
      </p>
      <p *ngIf="isAdminLogin">
        Regular user? <button class="link-button" (click)="switchToUser()">Switch to User Login</button>
      </p>
      <p class="company-name">JSC Global Solutions PVT. LTD.</p>
    </div>
  </div>
</div>
